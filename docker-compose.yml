version: "3.8"
services:
  # Сервис Postgres
  postgres:
    image: postgres:15
    container_name: contest_postgres
    environment:
      POSTGRES_USER: contest_user
      POSTGRES_PASSWORD: contest_pass
      POSTGRES_DB: contest_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Сервис Node.js (backend)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: contest_backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: contest_user
      DB_PASS: contest_pass
      DB_NAME: contest_db
      JWT_SECRET: MY_ULTRA_SECRET

  # Сервис фронтенда (Vue)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contest_frontend
    ports:
      - "8080:80" # Nginx внутри контейнера слушает 80
    depends_on:
      - backend

volumes:
  postgres_data:
